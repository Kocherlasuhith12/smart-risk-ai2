version: '3.9'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: smartrisk
      POSTGRES_PASSWORD: smartrisk123
      POSTGRES_DB: smartrisk_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://smartrisk:smartrisk123@db:5432/smartrisk_db
      SECRET_KEY: smartrisk-super-secret-key-2024
    volumes:
      - ./ml/models:/app/ml/models
    depends_on:
      - db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
